name: CI

on:
  push:
    branches: [ main, "copilot/**", "feat/**" ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  ci:
    name: Lint / Test / Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check package.json exists
        id: check_pkg
        run: |
          if [ -f package.json ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No package.json found, skipping CI steps"
          fi

      - name: Install dependencies
        if: steps.check_pkg.outputs.exists == 'true'
        run: npm install

      - name: TypeScript type check
        if: steps.check_pkg.outputs.exists == 'true'
        run: npx tsc --noEmit

      - name: Lint
        if: steps.check_pkg.outputs.exists == 'true'
        run: npm run lint

      - name: Run tests
        if: steps.check_pkg.outputs.exists == 'true'
        run: npx vitest run --reporter=verbose

      - name: Build
        if: steps.check_pkg.outputs.exists == 'true'
        run: npm run build

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check package.json exists
        id: check_pkg
        run: |
          if [ -f package.json ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No package.json found, skipping E2E"
          fi

      - name: Install dependencies
        if: steps.check_pkg.outputs.exists == 'true'
        run: npm install

      - name: Install Playwright browsers (Chromium only)
        if: steps.check_pkg.outputs.exists == 'true'
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        if: steps.check_pkg.outputs.exists == 'true'
        run: npm run test:e2e -- --project=chromium

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always() && steps.check_pkg.outputs.exists == 'true'
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

