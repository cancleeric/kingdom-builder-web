name: CI

on:
  push:
    branches: [ main, "copilot/**", "feat/**" ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  ci:
    name: Lint / Test / Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check package.json exists
        id: check_pkg
        run: |
          if [ -f package.json ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No package.json found, skipping CI steps"
          fi

      - name: Install dependencies
        if: steps.check_pkg.outputs.exists == 'true'
        run: npm install

      - name: TypeScript type check
        if: steps.check_pkg.outputs.exists == 'true'
        run: npx tsc --noEmit

      - name: Lint
        if: steps.check_pkg.outputs.exists == 'true'
        run: npm run lint

      - name: Run tests
        if: steps.check_pkg.outputs.exists == 'true'
        run: npx vitest run --reporter=verbose

      - name: Build
        if: steps.check_pkg.outputs.exists == 'true'
        run: npm run build
